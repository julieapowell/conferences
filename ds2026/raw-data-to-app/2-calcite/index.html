<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <title>ArcGIS Maps SDK for JavaScript CDN template</title>
  <link rel="icon" href="data:;base64,=" />
  <style>
    html,
    body {
      background-color: var(--calcite-ui-foreground-2);
      height: 100%;
      margin: 0;
    }

    arcgis-chart {
      width: 650px;
      height: 450px;
    }
  </style>
  <!-- Load the ArcGIS Maps SDK for JavaScript from the CDN -->
  <script type="module" src="https://js.arcgis.com/5.0/"></script>
  <script type="module" src="./app.js" defer></script>

</head>

<body>
  <calcite-shell content-behind class="mint-theme">
    <calcite-navigation slot="header" id="nav">
      <calcite-navigation-logo href="#" thumbnail="./helo-other.png" alt="Application logo"
        slot="logo"></calcite-navigation-logo>
    </calcite-navigation>

    <arcgis-map id="map" item-id="5b3a9e652eb14b1892a083e4c2c064e4">
      <calcite-shell-panel slot="top-left" width="l">
        <calcite-panel heading="How do helicopters affect New Yorkers?">
          <calcite-accordion selection-mode="single">
            <calcite-accordion-item heading="Flights by Date" icon-start="scan-vertical">
              <calcite-action slot="actions-end" icon="trash" id="clear-chart-filter"
                style="display: none"></calcite-action>
              <calcite-notice open width="full">
                <div slot="message">
                  Click on a date cell to filter flights.
                </div>
              </calcite-notice>
              <calcite-block expanded>
                <!-- <arcgis-chart id="cal-heat-chart" layer-item-id="e1e4fe880d964869859438741ffd4c92"
                  chart-index="0"></arcgis-chart> -->
                <arcgis-chart id="cal-heat-chart"></arcgis-chart>
              </calcite-block>
            </calcite-accordion-item>
          </calcite-accordion>
        </calcite-panel>
      </calcite-shell-panel>
      <arcgis-expand slot="top-right">
        <arcgis-bookmarks show-add-bookmark-button></arcgis-bookmarks>
      </arcgis-expand>
      <arcgis-basemap-toggle slot="bottom-left"></arcgis-basemap-toggle>
    </arcgis-map>
  </calcite-shell>
</body>

<script type="module">
  const viewElement = document.querySelector("arcgis-map");
  const calciteNavLogo = document.querySelector("calcite-navigation-logo");

  await viewElement.viewOnReady();
  const {
    title,
    description
  } = viewElement.map.portalItem;
  if (calciteNavLogo) {
    calciteNavLogo.heading = title === "" ? "A web map" : title;
  }
</script>

</html>
