<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <title>ArcGIS Maps SDK for JavaScript CDN template</title>
  <link rel="icon" href="data:;base64,=" />
  <style>
    html,
    body {
      background-color: var(--calcite-ui-foreground-2);
      height: 100%;
      margin: 0;
    }

    arcgis-chart {
      width: 350px;
      height: 250px;
    }
  </style>

  <script type="module" src="https://js.arcgis.com/5.0/"></script>

</head>

<body>
  <!-- The Shell component is used as a layout for this template -->
  <calcite-shell content-behind>
    <calcite-navigation slot="header">
      <!-- Heading and description dynamically populated below using JavaScript -->
      <calcite-navigation-logo heading-level="1" slot="logo"></calcite-navigation-logo>
    </calcite-navigation>

    <!-- The Map component fits to the size of the parent element -->
    <!-- The basemap, extent, zoom and more are provided by the Web Map (item-id) -->
    <arcgis-map item-id="5b3a9e652eb14b1892a083e4c2c064e4">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-expand slot="top-right">
        <arcgis-bookmarks></arcgis-bookmarks>
      </arcgis-expand>


      <arcgis-basemap-toggle slot="bottom-left"></arcgis-basemap-toggle>

      <!-- A Feature Layer in the Web Map has an associated chart (layer-item-id) -->
      <arcgis-chart layer-item-id="e1e4fe880d964869859438741ffd4c92" chart-index="1" slot="bottom-right"></arcgis-chart>
    </arcgis-map>
  </calcite-shell>
</body>

</html>
