<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>ISS Tracker</title>

    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
</head>

<body>

    <calcite-shell class="calcite-mode-dark">
        <calcite-navigation slot="header">
            <calcite-navigation-logo heading="Track the International Space Station" slot="logo" target="_blank" />
        </calcite-navigation>

        <div id="mapContainer" class="map-container">
            <arcgis-map id="mapElem" item-id="ab4b2ea309e24df9b6e7d37b766cd1d6">
                <arcgis-expand slot="top-left">
                    <arcgis-legend></arcgis-legend>
                </arcgis-expand>
                <div id="titleDiv" slot="top-right">
                    <calcite-panel heading="Space Station Location">
                        <calcite-block id="statusBlock" open summary="Past observations" slot="footer"
                            style="margin-block: 0">
                            <calcite-label disable-spacing layout="inline" class="label-wrapper">
                                <calcite-icon icon="clock-forward" scale="s" class="switch-icon"></calcite-icon>
                                <calcite-switch id="2d-live-switch"></calcite-switch>
                                <calcite-icon icon="activity-monitor" scale="s" class="switch-icon"></calcite-icon>
                            </calcite-label>
                        </calcite-block>
                    </calcite-panel>
                </div>
                <div id="toggle" slot="top-left">
                    <calcite-icon icon="globe" id="2d-3d-toggle-map"></calcite-icon>
                </div>
                <arcgis-layer-list slot="bottom-left"></arcgis-layer-list>
            </arcgis-map>

            <arcgis-scene id="sceneElem" style="display: none;">
                <arcgis-expand slot="top-left">
                    <arcgis-legend></arcgis-legend>
                </arcgis-expand>

                <div id="titleDiv" slot="top-right">
                    <calcite-panel heading="Space Station Location">
                        <calcite-block id="statusBlock" open summary="Past observations" slot="footer"
                            style="margin-block: 0">
                            <calcite-label disable-spacing layout="inline" class="label-wrapper">
                                <calcite-icon icon="clock-forward" scale="s" class="switch-icon"></calcite-icon>
                                <calcite-switch id="3d-live-switch"></calcite-switch>
                                <calcite-icon icon="activity-monitor" scale="s" class="switch-icon"></calcite-icon>
                            </calcite-label>
                        </calcite-block>
                    </calcite-panel>
                </div>

                <div id="toggle" slot="top-left">
                    <calcite-icon icon="globe" id="2d-3d-toggle-scene"></calcite-icon>
                </div>
                <arcgis-layer-list slot="bottom-left"></arcgis-layer-list>
            </arcgis-scene>
        </div>
        <arcgis-time-slider loop time-visible reference-element="#mapElem"></arcgis-time-slider>
    </calcite-shell>
    <script src="./main.js" type="module"></script>

</body>

</html>
